# Snippet: copy to /etc/nginx/sites-available/biblereader.upscale-automation.com
# then: sudo ln -sf /etc/nginx/sites-available/biblereader.upscale-automation.com /etc/nginx/sites-enabled/
# sudo nginx -t && sudo systemctl reload nginx
#
# TLS: after DNS points at this host:
#   sudo certbot --nginx -d biblereader.upscale-automation.com

upstream biblereader_web {
    server 127.0.0.1:4000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name biblereader.upscale-automation.com;

    location / {
        proxy_pass http://biblereader_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_buffering off;
        proxy_read_timeout 86400s;
        client_max_body_size 8m;
    }
}
