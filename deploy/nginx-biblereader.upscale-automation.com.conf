# Bible Reader — nginx site for biblereader.upscale-automation.com
#
# Copy from ~/biblereader/nginx-biblereader.upscale-automation.com.conf on the server:
#   sudo cp ~/biblereader/nginx-biblereader.upscale-automation.com.conf \
#     /etc/nginx/sites-available/biblereader.upscale-automation.com
#   sudo ln -sf /etc/nginx/sites-available/biblereader.upscale-automation.com \
#     /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx
#
# TLS: sudo certbot --nginx -d biblereader.upscale-automation.com
# If certbot edits this file, ensure the listen 443 location / block keeps the
# WebSocket headers and proxy_read_timeout below.

map $http_upgrade $connection_upgrade {
    default upgrade;
    ''      close;
}

upstream biblereader_web {
    server 127.0.0.1:4000;
    keepalive 8;
}

server {
    listen 80;
    listen [::]:80;
    server_name biblereader.upscale-automation.com;

    location / {
        proxy_pass http://biblereader_web;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Port $server_port;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection $connection_upgrade;
        proxy_buffering off;
        proxy_read_timeout 86400s;
        proxy_send_timeout 86400s;
        proxy_set_header X-Accel-Buffering no;
        client_max_body_size 8m;
    }
}

